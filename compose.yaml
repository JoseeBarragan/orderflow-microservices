services: 
  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_USER: inventory-user 
      POSTGRES_PASSWORD: inventory-pass 
      POSTGRES_DB: inventory-db
    ports: 
      - '5432:5432'
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inventory-user -d inventory-db']
      interval: 5s
      timeout: 5s
      retries: 5
  orders-db:
    image: postgres:16
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
      POSTGRES_DB: orders_db
    ports:
      - '5433:5432'
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orders_user -d orders_db']
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  orders_db_data:
  inventory_db_data:

